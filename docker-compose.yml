version: '3.8'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-setup:
    image: confluentinc/cp-kafka:latest
    container_name: kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic application-logs --partitions 1 --replication-factor 1 --config retention.ms=86400000 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic audit-logs --partitions 1 --replication-factor 1 --config retention.ms=7776000000 --config segment.bytes=536870912 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic trace-groups --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic log-alerts --partitions 1 --replication-factor 1

  web-api:
    build: ./services/web-api
    container_name: web-api
    depends_on:
      kafka:
        condition: service_healthy

  worker:
    build: ./services/worker
    container_name: worker
    depends_on:
      kafka:
        condition: service_healthy

  db-proxy:
    build: ./services/db-proxy
    container_name: db-proxy
    depends_on:
      kafka:
        condition: service_healthy